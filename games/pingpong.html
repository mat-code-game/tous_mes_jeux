<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>3D Ping Pong Smash</title>
    <style>
      :root {
        --bg: #050505;
        --fg: #00f2ff;
        --accent: #ff00ea;
        --panel-bg: rgba(20, 20, 25, 0.8);
      }

      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        overflow: hidden;
        background-color: var(--bg);
        color: var(--fg);
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      #ui-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
        z-index: 10;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: auto;
      }

      h1 {
        font-size: 1.2rem;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 10px var(--fg);
      }

      .score-panel {
        background: var(--panel-bg);
        padding: 10px 20px;
        border-radius: 30px;
        border: 1px solid var(--fg);
        font-size: 24px;
        font-weight: bold;
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        pointer-events: auto;
      }

      .avatar-hint {
        font-size: 10px;
        color: var(--fg);
        margin-bottom: 5px;
        opacity: 0.7;
      }

      /* Style pour le sélecteur de difficulté */
      .difficulty-selector {
        display: flex;
        gap: 5px;
        margin: 15px 0;
      }

      .diff-btn {
        background: rgba(255,255,255,0.1);
        border: 1px solid var(--fg);
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .diff-btn.active {
        background: var(--fg);
        color: black;
        box-shadow: 0 0 10px var(--fg);
      }

      .controls-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                    url('images/pingpong_serious.png');
        background-size: cover;
        background-position: center;
        padding: 30px;
        border-radius: 20px;
        border: 2px solid var(--accent);
        pointer-events: auto;
        transition: opacity 0.3s;
        z-index: 20;
        min-width: 320px;
      }

      .hidden {
        display: none;
        opacity: 0;
      }

      .profile-setup {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 20px;
      }

      .avatar-preview {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #222;
        border: 2px solid var(--fg);
        margin-bottom: 5px;
        object-fit: cover;
        box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        transition: transform 0.2s;
        cursor: pointer;
      }
      .avatar-preview:hover {
        transform: scale(1.1);
      }
      .avatar-hint {
        font-size: 10px;
        color: var(--fg);
        margin-bottom: 15px;
        opacity: 0.7;
      }

      .pseudo-input {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--accent);
        background: rgba(0,0,0,0.5);
        color: white;
        font-size: 16px;
        text-align: center;
        font-family: inherit;
        outline: none;
        width: 80%;
        max-width: 200px;
      }

      .pseudo-input:focus {
        box-shadow: 0 0 10px var(--accent);
      }

      .btn {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        margin: 10px;
        text-transform: uppercase;
        box-shadow: 0 4px 0 #b300a3;
        transition: all 0.1s;
      }

      .btn:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #b300a3;
      }

      /* Galerie d'Avatars */
      .avatar-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        margin-bottom: 15px;
        max-height: 150px;
        overflow-y: auto;
        padding: 5px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        background: rgba(0,0,0,0.3);
      }

      .avatar-option {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.2s;
        object-fit: cover;
      }

      .avatar-option:hover {
        transform: scale(1.1);
        border-color: var(--fg);
      }

      .avatar-option.selected {
        border-color: var(--accent);
        box-shadow: 0 0 10px var(--accent);
        transform: scale(1.1);
      }

      .btn-camera {
        background: #222;
        border: 1px solid #444;
        box-shadow: 0 4px 0 #111;
      }

      .controls-sidebar {
        position: absolute;
        top: 80px; /* En dessous du header */
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: auto;
        z-index: 100;
      }

      .controls-sidebar .btn {
        width: 50px;
        height: 50px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        margin: 0;
      }

      .hidden-during-game {
        display: none !important;
      }

      .touch-zone {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        touch-action: none;
      }

      #debug {
        position: absolute;
        bottom: 10px;
        left: 10px;
        font-size: 10px;
        color: #555;
        pointer-events: none;
      }

      /* Panneau latéral pour le classement */
      #side-leaderboard {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        width: 250px;
        max-height: 80vh;
        background: var(--panel-bg);
        border: 1px solid var(--fg);
        border-radius: 15px;
        padding: 15px;
        pointer-events: auto;
        z-index: 100;
        backdrop-filter: blur(5px);
        overflow-y: auto;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        display: flex;
        flex-direction: column;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      #side-leaderboard.hidden-panel {
        transform: translateY(-50%) translateX(calc(100% + 40px));
      }

      #side-leaderboard h3 {
        margin: 0 0 10px 0;
        font-size: 14px;
        text-align: center;
        color: var(--fg);
        text-transform: uppercase;
        border-bottom: 1px solid var(--fg);
        padding-bottom: 5px;
      }

      .mobile-only {
        display: none;
      }

      @media (max-width: 768px) {
        #side-leaderboard {
          width: 180px;
          right: 5px;
          padding: 8px;
        }
        #side-leaderboard h3 { font-size: 12px; }
      }

      /* Overlay Rotation Mobile */
      #orientation-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 1000;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }

      @media screen and (max-width: 900px) and (orientation: portrait) {
        #orientation-overlay {
          display: flex;
        }
      }

      .rotate-icon {
        font-size: 50px;
        margin-bottom: 20px;
        animation: rotate 2s infinite;
      }

      @keyframes rotate {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
        100% { transform: rotate(0deg); }
      }
    </style>
  </head>
  <body>
    <!-- Overlay de rotation pour mobile -->
    <div id="orientation-overlay">
      <div class="rotate-icon">📱🔄</div>
      <h2>Pivotez votre appareil</h2>
      <p>Pour une meilleure expérience, le jeu se joue en mode paysage.</p>
    </div>

    <div id="ui-container">
      <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <h1>🏓 3D Pong Smash</h1>
        </div>
        <div class="score-panel" id="score">0 — 0</div>
      </header>

      <div class="controls-sidebar">
        <button class="btn btn-camera" id="btnCam" title="Caméra (C)">🎥</button>
        <button class="btn" id="btnToggleLeaderboard" title="Division (L)" style="background: #333;">🏆</button>
        <button class="btn" id="btnMute" title="Son (M)" style="background: #222;">🔊</button>
        <button class="btn" id="btnPause" title="Pause (Espace)">⏸</button>
        <button class="btn" id="btnFullscreen" title="Plein Écran (F)" style="background: #444;">⛶</button>
        <button class="btn" id="btnShare" title="Partager" style="background: #25d366;">📤</button>
        <button class="btn" id="btnRestart" title="Restart" style="background: #ff00ea;">🔄</button>
      </div>
    </div>

    <div id="side-leaderboard">
      <h3 id="leaderboardTitle">🏆 TOP JOUEURS</h3>
      <div id="leaderboardContent">
        Chargement...
      </div>
    </div>

      <div class="controls-overlay" id="overlay">
      <div id="profileSetup" class="profile-setup">
        <h3 style="font-size: 14px; margin-bottom: 10px; color: var(--fg);">Choisissez votre Avatar</h3>
        <div id="avatarGallery" class="avatar-grid">
          <!-- Les 20 avatars seront générés ici -->
        </div>
        <input type="text" id="pseudoInput" class="pseudo-input" placeholder="Entrez votre pseudo" maxlength="15" />
        
        <div class="difficulty-selector">
          <button class="diff-btn" data-diff="0">Recrue</button>
          <button class="diff-btn active" data-diff="1">Pro</button>
          <button class="diff-btn" data-diff="2">Champion</button>
          <button class="diff-btn" data-diff="3">Légende</button>
        </div>
      </div>
      <h2 id="msg">PRÊT ?</h2>
      <button class="btn" id="btnStart">JOUER</button>
      <div style="font-size: 14px; margin-top: 15px; opacity: 0.8">
        Clavier: ↑/↓ ou Z/S · Caméra: C · Pause: Espace<br />
        Tactile: Glissez sur l'écran pour bouger la raquette
      </div>
    </div>

    <div class="touch-zone" id="touchZone"></div>
    <div id="debug"></div>

    <!-- Three.js from CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>

    <!-- AUDIO -->
    <audio id="bgMusic" loop preload="auto">
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
      import * as THREE from "three";
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      // --- SUPABASE CONFIGURATION ---
      // ⚠️ À REMPLACER PAR TES IDENTIFIANTS SUPABASE ⚠️
      const SUPABASE_URL = "https://hedimvodzdzwnluekmtd.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZGltdm9kemR6d25sdWVrbXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NjM3NTMsImV4cCI6MjA4NjMzOTc1M30.OJe37omxb53GnD0uohQ6tfxZPM48daH_sO1YR4SPHCw";
      
      let supabase = null;
      try {
        if (SUPABASE_URL && SUPABASE_URL !== "TON_URL_SUPABASE") {
          supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        }
      } catch(e) {
        console.warn("Supabase non initialisé.");
      }

      // --- CONSTANTS ---
      const TABLE_WIDTH = 20;
      const TABLE_HEIGHT = 1;
      const TABLE_DEPTH = 12;
      const PADDLE_WIDTH = 0.5;
      const PADDLE_HEIGHT = 1.2;
      const PADDLE_DEPTH = 2.5;
      const BALL_RADIUS = 0.3;
    //   const WIN_SCORE = 1;
      const WIN_SCORE = 11;
      
      // --- DIVISIONS CONFIG ---
      const DIVISIONS = [
        { name: "Cuir", min: -Infinity, max: 49, color: "#8B4513", icon: "🟫" },
        { name: "Cuivre", min: 50, max: 149, color: "#CD7F32", icon: "🟧" },
        { name: "Fer", min: 150, max: 299, color: "#A9A9A9", icon: "⬜" },
        { name: "Or", min: 300, max: 599, color: "#FFD700", icon: "🟨" },
        { name: "Diamant", min: 600, max: 999, color: "#00BFFF", icon: "💎" },
        { name: "Netherite", min: 1000, max: Infinity, color: "#4B0082", icon: "🟣" }
      ];

      function getDivision(pts) {
        return DIVISIONS.find(d => pts >= d.min && pts <= d.max) || DIVISIONS[0];
      }

      // --- GAME STATE ---
      const state = {
        running: false,
        gameOver: false,
        scoreL: 0,
        scoreR: 0,
        ball: { x: 0, z: 0, vx: 0.15, vz: 0 },
        paddleL: { x: -TABLE_WIDTH / 2 + 1, z: 0, targetZ: 0 },
        paddleR: { x: TABLE_WIDTH / 2 - 1, z: 0, targetZ: 0 },
        camIndex: 0,
        touchActive: false,
        difficulty: 1, // 0: Recrue, 1: Pro, 2: Champion, 3: Légende
        mute: false,
      };

      const DIFF_SETTINGS = [
        { aiSpeed: 0.08, aiReaction: 1.0 }, // Recrue
        { aiSpeed: 0.12, aiReaction: 0.5 }, // Pro
        { aiSpeed: 0.18, aiReaction: 0.2 }, // Champion
        { aiSpeed: 0.25, aiReaction: 0.05 }, // Légende
      ];

      // --- THREE.JS SETUP ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050505);
      scene.fog = new THREE.Fog(0x050505, 10, 50);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // --- CAMERAS ---
      const cameras = [
        // 0: Arcade View (Side-top)
        new THREE.PerspectiveCamera(
          50,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        ),
        // 1: Immersive View (Behind P1)
        new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        ),
        // 2: Top View (Classic)
        new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        ),
      ];

      cameras[0].position.set(0, 15, 10);
      cameras[0].lookAt(0, 0, 0);

      cameras[1].position.set(-15, 6, 0);
      cameras[1].lookAt(5, 0, 0);

      cameras[2].position.set(0, 20, 0);
      cameras[2].lookAt(0, 0, 0);

      let activeCamera = cameras[0];

      // --- LIGHTS ---
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const mainLight = new THREE.PointLight(0x00f2ff, 1, 50);
      mainLight.position.set(0, 10, 0);
      mainLight.castShadow = true;
      scene.add(mainLight);

      const ballLight = new THREE.PointLight(0xff00ea, 2, 8);
      scene.add(ballLight);

      // --- PARTICLES ---
      const particlesGeo = new THREE.BufferGeometry();
      const particlesCount = 50;
      const positions = new Float32Array(particlesCount * 3);
      particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const particlesMat = new THREE.PointsMaterial({
        color: 0xff00ea,
        size: 0.1,
        transparent: true,
        opacity: 0,
      });
      const particleSystem = new THREE.Points(particlesGeo, particlesMat);
      scene.add(particleSystem);

      let particleVelocities = [];

      function emitParticles(x, z) {
        const positions = particleSystem.geometry.attributes.position.array;
        particleVelocities = [];
        for (let i = 0; i < particlesCount; i++) {
          positions[i * 3] = x;
          positions[i * 3 + 1] = BALL_RADIUS;
          positions[i * 3 + 2] = z;
          
          particleVelocities.push({
            x: (Math.random() - 0.5) * 0.2,
            y: (Math.random()) * 0.1,
            z: (Math.random() - 0.5) * 0.2
          });
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
        particlesMat.opacity = 1;
      }

      function updateParticles() {
        if (particlesMat.opacity <= 0) return;
        const positions = particleSystem.geometry.attributes.position.array;
        for (let i = 0; i < particlesCount; i++) {
          positions[i * 3] += particleVelocities[i].x;
          positions[i * 3 + 1] += particleVelocities[i].y;
          positions[i * 3 + 2] += particleVelocities[i].z;
          particleVelocities[i].y -= 0.005; // gravity
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
        particlesMat.opacity -= 0.02;
      }

      // --- BALL TRAIL ---
      const trailCount = 10;
      const trailGeo = new THREE.SphereGeometry(BALL_RADIUS * 0.8, 8, 8);
      const trailMeshes = [];
      for (let i = 0; i < trailCount; i++) {
        const mat = new THREE.MeshStandardMaterial({
          color: 0xff00ea,
          transparent: true,
          opacity: (1 - (i / trailCount)) * 0.3,
          emissive: 0xff00ea,
          emissiveIntensity: 1,
        });
        const mesh = new THREE.Mesh(trailGeo, mat);
        scene.add(mesh);
        trailMeshes.push(mesh);
      }
      const ballHistory = [];

      function updateTrail() {
        ballHistory.unshift({ x: state.ball.x, z: state.ball.z });
        if (ballHistory.length > trailCount) ballHistory.pop();
        
        for (let i = 0; i < trailMeshes.length; i++) {
          if (ballHistory[i]) {
            trailMeshes[i].position.set(ballHistory[i].x, BALL_RADIUS, ballHistory[i].z);
            trailMeshes[i].visible = state.running;
          } else {
            trailMeshes[i].visible = false;
          }
        }
      }

      // --- OBJECTS ---
      // Table
      const tableGeo = new THREE.BoxGeometry(
        TABLE_WIDTH,
        TABLE_HEIGHT,
        TABLE_DEPTH,
      );
      const tableMat = new THREE.MeshStandardMaterial({
        color: 0x111111,
        roughness: 0.2,
        metalness: 0.8,
        emissive: 0x001122,
      });
      const table = new THREE.Mesh(tableGeo, tableMat);
      table.position.y = -TABLE_HEIGHT / 2;
      table.receiveShadow = true;
      scene.add(table);

      // Grid/Lines
      const grid = new THREE.GridHelper(20, 10, 0x00f2ff, 0x222222);
      grid.position.y = 0.01;
      scene.add(grid);

      // Side Walls (Neon)
      const wallGeo = new THREE.BoxGeometry(TABLE_WIDTH, 0.2, 0.2);
      const wallMat = new THREE.MeshStandardMaterial({
        color: 0x00f2ff,
        emissive: 0x00f2ff,
        emissiveIntensity: 2,
      });

      const wallUp = new THREE.Mesh(wallGeo, wallMat);
      wallUp.position.set(0, 0.1, -TABLE_DEPTH / 2);
      scene.add(wallUp);

      const wallDown = new THREE.Mesh(wallGeo, wallMat);
      wallDown.position.set(0, 0.1, TABLE_DEPTH / 2);
      scene.add(wallDown);

      // Ball
      const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
      const ballMat = new THREE.MeshStandardMaterial({
        color: 0xff00ea,
        emissive: 0xff00ea,
        emissiveIntensity: 2,
      });
      const ballMesh = new THREE.Mesh(ballGeo, ballMat);
      ballMesh.castShadow = true;
      scene.add(ballMesh);

      // Paddles
      const paddleGeo = new THREE.BoxGeometry(
        PADDLE_WIDTH,
        PADDLE_HEIGHT,
        PADDLE_DEPTH,
      );
      const paddleMatL = new THREE.MeshStandardMaterial({
        color: 0x00f2ff,
        emissive: 0x00f2ff,
        emissiveIntensity: 1,
      });
      const paddleMatR = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xaaaaaa,
        emissiveIntensity: 0.5,
      });

      const paddleL = new THREE.Mesh(paddleGeo, paddleMatL);
      paddleL.position.set(state.paddleL.x, PADDLE_HEIGHT / 2, 0);
      paddleL.castShadow = true;
      scene.add(paddleL);

      const paddleR = new THREE.Mesh(paddleGeo, paddleMatR);
      paddleR.position.set(state.paddleR.x, PADDLE_HEIGHT / 2, 0);
      paddleR.castShadow = true;
      scene.add(paddleR);

      // --- CONTROLS ---
      const keys = {};
      window.addEventListener("keydown", (e) => {
        if (document.activeElement.tagName === "INPUT") return;
        const key = e.key.toLowerCase();
        
        if (state.camIndex === 1) {
            // Vue Immersive: Inversion et ajout Gauche/Droite
            if (key === "arrowup" || key === "z" || key === "arrowleft") keys["arrowup"] = true;
            if (key === "arrowdown" || key === "s" || key === "arrowright") keys["arrowdown"] = true;
        } else {
            // Vue Normale
            keys[key] = true;
        }
        
        if (key === " " || key === "escape") togglePause();
        if (key === "c") cycleCamera();
        if (key === "r") restart();
      });

      window.addEventListener("keyup", (e) => {
        const key = e.key.toLowerCase();
        if (state.camIndex === 1) {
            if (key === "arrowup" || key === "z" || key === "arrowleft") keys["arrowup"] = false;
            if (key === "arrowdown" || key === "s" || key === "arrowright") keys["arrowdown"] = false;
        } else {
            keys[key] = false;
        }
      });

      const touchZone = document.getElementById("touchZone");
      touchZone.addEventListener("touchstart", handleTouch, { passive: false });
      touchZone.addEventListener("touchmove", handleTouch, { passive: false });
      touchZone.addEventListener("touchend", () => (state.touchActive = false));

      function handleTouch(e) {
        if (!state.running || state.gameOver) return;
        const rect = touchZone.getBoundingClientRect();
        const touch = e.touches[0];
        
        let val;
        if (state.camIndex === 1) {
            // Vue Immersive: Utiliser X (horizontal)
            val = (touch.clientX - rect.left) / rect.width;
        } else {
            // Vue Normale: Utiliser Y (vertical)
            val = (touch.clientY - rect.top) / rect.height;
        }
        
        state.paddleL.z = (val - 0.5) * TABLE_DEPTH;
        state.paddleL.z = Math.max(
          -TABLE_DEPTH / 2 + PADDLE_DEPTH / 2,
          Math.min(TABLE_DEPTH / 2 - PADDLE_DEPTH / 2, state.paddleL.z),
        );
      }

      // --- UI ACTIONS ---
      const scoreEl = document.getElementById("score");
      const overlay = document.getElementById("overlay");
      const msgEl = document.getElementById("msg");
      const btnStart = document.getElementById("btnStart");
      const btnPause = document.getElementById("btnPause");
      const btnRestart = document.getElementById("btnRestart");
      const btnCam = document.getElementById("btnCam");
      const btnFullscreen = document.getElementById("btnFullscreen");
      const btnMute = document.getElementById("btnMute");
      const btnShare = document.getElementById("btnShare");
      const bgMusic = document.getElementById("bgMusic");
      
      const pseudoInput = document.getElementById("pseudoInput");
      const avatarGallery = document.getElementById("avatarGallery");
      const profileSetup = document.getElementById("profileSetup");
      
      let currentPseudo = localStorage.getItem("pingpong_pseudo") || "Joueur";
      let customAvatar = localStorage.getItem("pingpong_custom_avatar") || null;
      
      pseudoInput.value = currentPseudo;

      // Générer les 20 avatars
      const AVATAR_COUNT = 20;
      for (let i = 1; i <= AVATAR_COUNT; i++) {
        const seed = `Bot${i}`;
        const url = `https://api.dicebear.com/7.x/bottts/svg?seed=${seed}`;
        const img = document.createElement("img");
        img.src = url;
        img.className = "avatar-option";
        if (customAvatar === url) img.classList.add("selected");
        
        img.onclick = () => {
          // Désélectionner les autres
          document.querySelectorAll(".avatar-option").forEach(opt => opt.classList.remove("selected"));
          // Sélectionner celui-ci
          img.classList.add("selected");
          customAvatar = url;
          localStorage.setItem("pingpong_custom_avatar", url);
          loadLeaderboard(); // Pour mettre à jour l'affichage de notre division avec le nouvel avatar
        };
        avatarGallery.appendChild(img);
      }

      pseudoInput.addEventListener("input", (e) => {
        currentPseudo = e.target.value.trim() || "Joueur";
      });

      // Gestion Difficulté
      const diffBtns = document.querySelectorAll(".diff-btn");
      diffBtns.forEach(btn => {
        btn.onclick = () => {
          diffBtns.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          state.difficulty = parseInt(btn.dataset.diff);
        };
      });

      // Audio Context pour SFX
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function playSFX(freq, duration, type = "square") {
        if (state.mute) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      }

      btnStart.onclick = () => {
        // Tenter de passer en plein écran et verrouiller le paysage sur mobile
        if (window.innerWidth < 1000) {
          if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
          }
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
          }
        }
        
        localStorage.setItem("pingpong_pseudo", currentPseudo);
        profileSetup.style.display = "none";
        overlay.classList.add("hidden");
        state.running = true;
        
        // Démarrer la musique
        if (!state.mute) {
            bgMusic.play().catch(e => console.warn("Auto-play bloqué:", e));
        }
        
        if (state.gameOver) restart();
      };

      btnPause.onclick = togglePause;
      btnRestart.onclick = restart;
      btnCam.onclick = cycleCamera;
      btnFullscreen.onclick = () => {
          if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen().catch(err => {
                  alert(`Erreur plein écran: ${err.message}`);
              });
          } else {
              if (document.exitFullscreen) {
                  document.exitFullscreen();
              }
          }
      };

      btnMute.onclick = () => {
        state.mute = !state.mute;
        btnMute.textContent = state.mute ? "🔇" : "🔊";
        bgMusic.muted = state.mute;
      };

      btnShare.onclick = async () => {
        let pts = 0;
        // Tenter de récupérer les points depuis le leaderboard localement
        const me = (window.lastSortedLeaderboard || []).find(p => p.pseudo === currentPseudo);
        if (me) pts = me.pts;

        const text = `J'ai fait ${pts} points au Ping Pong Smash ! Arriveras-tu à me battre ? 🏓🔥`;
        const url = window.location.href;

        if (navigator.share) {
          try {
            await navigator.share({
              title: '3D Ping Pong Smash',
              text: text,
              url: url,
            });
          } catch (err) { console.error(err); }
        } else {
          navigator.clipboard.writeText(`${text} ${url}`).then(() => {
            alert("Score copié ! Prêt à être partagé.");
          });
        }
      };

      function togglePause() {
        state.running = !state.running;
        btnPause.innerHTML = state.running ? "⏸" : "▶";
        msgEl.textContent = state.running ? "" : "PAUSE";
        overlay.classList.toggle("hidden", state.running);
      }

      function restart() {
        state.gameOver = false;
        state.scoreL = 0;
        state.scoreR = 0;
        updateScore();
        resetBall(1);
        overlay.classList.add("hidden");
        state.running = true;
        updateUIState();
        profileSetup.style.display = "none";
        msgEl.textContent = "C'EST PARTI !";
        
        state.camIndex = 0;
        activeCamera = cameras[state.camIndex];
      }

      function cycleCamera() {
        state.camIndex = (state.camIndex + 1) % cameras.length;
        activeCamera = cameras[state.camIndex];
      }

      function updateUIState() {
        const pauseBtn = document.getElementById("btnPause");
        // Le bouton Pause ne s'affiche qu'en cours de jeu (pas au Game Over)
        if (state.gameOver) {
            pauseBtn.classList.add("hidden-during-game");
        } else {
            pauseBtn.classList.remove("hidden-during-game");
        }
      }

      function updateScore() {
        scoreEl.textContent = `${state.scoreL} — ${state.scoreR}`;
        updateUIState();
      }

      function resetBall(dir) {
        state.ball.x = 0;
        state.ball.z = 0;
        state.ball.vx = 0.15 * dir;
        state.ball.vz = (Math.random() - 0.5) * 0.2;
      }

      // --- GAME LOGIC ---
      function update() {
        if (!state.running || state.gameOver) return;

        // Player movement (L)
        const speed = 0.25;
        if (keys["arrowup"] || keys["z"]) state.paddleL.targetZ -= speed;
        if (keys["arrowdown"] || keys["s"]) state.paddleL.targetZ += speed;

        // Apply smoothing to paddle
        state.paddleL.z += (state.paddleL.targetZ - state.paddleL.z) * 0.2;
        state.paddleL.z = Math.max(
          -TABLE_DEPTH / 2 + PADDLE_DEPTH / 2,
          Math.min(TABLE_DEPTH / 2 - PADDLE_DEPTH / 2, state.paddleL.z),
        );
        paddleL.position.z = state.paddleL.z;

        // AI movement (R)
        const diff = DIFF_SETTINGS[state.difficulty];
        const aiSpeed = diff.aiSpeed;
        const targetZ = state.ball.z;
        const error = (Math.random() - 0.5) * diff.aiReaction * TABLE_DEPTH;
        
        if (targetZ < state.paddleR.z - 0.5 + error) state.paddleR.z -= aiSpeed;
        else if (targetZ > state.paddleR.z + 0.5 + error) state.paddleR.z += aiSpeed;
        
        state.paddleR.z = Math.max(
          -TABLE_DEPTH / 2 + PADDLE_DEPTH / 2,
          Math.min(TABLE_DEPTH / 2 - PADDLE_DEPTH / 2, state.paddleR.z),
        );
        paddleR.position.z = state.paddleR.z;

        // Ball movement
        state.ball.x += state.ball.vx;
        state.ball.z += state.ball.vz;

        // Wall collisions
        if (Math.abs(state.ball.z) > TABLE_DEPTH / 2 - BALL_RADIUS) {
          state.ball.vz *= -1;
          state.ball.z =
            Math.sign(state.ball.z) * (TABLE_DEPTH / 2 - BALL_RADIUS);
          playSFX(200, 0.1, "sine"); // SFX Rebond mur
        }

        // Paddle collisions
        // Left
        if (
          state.ball.vx < 0 &&
          state.ball.x < state.paddleL.x + PADDLE_WIDTH / 2 + BALL_RADIUS &&
          state.ball.x > state.paddleL.x - PADDLE_WIDTH / 2 &&
          Math.abs(state.ball.z - state.paddleL.z) <
            PADDLE_DEPTH / 2 + BALL_RADIUS
        ) {
          state.ball.vx *= -1.1; // accelerate
          state.ball.vz += (state.ball.z - state.paddleL.z) * 0.2;
          state.ball.x = state.paddleL.x + PADDLE_WIDTH / 2 + BALL_RADIUS;
          playSFX(440, 0.15); // SFX Impact
          emitParticles(state.ball.x, state.ball.z);
        }

        // Right
        if (
          state.ball.vx > 0 &&
          state.ball.x > state.paddleR.x - PADDLE_WIDTH / 2 - BALL_RADIUS &&
          state.ball.x < state.paddleR.x + PADDLE_WIDTH / 2 &&
          Math.abs(state.ball.z - state.paddleR.z) <
            PADDLE_DEPTH / 2 + BALL_RADIUS
        ) {
          state.ball.vx *= -1.1;
          state.ball.vz += (state.ball.z - state.paddleR.z) * 0.2;
          state.ball.x = state.paddleR.x - PADDLE_WIDTH / 2 - BALL_RADIUS;
          playSFX(330, 0.15); // SFX Impact
          emitParticles(state.ball.x, state.ball.z);
        }

        // Scoring
        if (state.ball.x < -TABLE_WIDTH / 2) {
          state.scoreR++;
          playSFX(150, 0.5, "sawtooth"); // SFX Point perdu
          checkWin();
          if (!state.gameOver) resetBall(1);
        } else if (state.ball.x > TABLE_WIDTH / 2) {
          state.scoreL++;
          playSFX(600, 0.5, "sine"); // SFX Point gagné
          checkWin();
          if (!state.gameOver) resetBall(-1);
        }

        // Clamp max speed
        const maxSpeed = 0.4;
        if (Math.abs(state.ball.vx) > maxSpeed)
          state.ball.vx = Math.sign(state.ball.vx) * maxSpeed;

        // Sync Meshes
        ballMesh.position.set(state.ball.x, BALL_RADIUS, state.ball.z);
        ballLight.position.set(state.ball.x, BALL_RADIUS + 0.5, state.ball.z);
      }

      function checkWin() {
        updateScore();
        if (state.scoreL >= WIN_SCORE || state.scoreR >= WIN_SCORE) {
          state.gameOver = true;
          state.running = false;
          
          const isWin = state.scoreL >= WIN_SCORE;
          msgEl.textContent = isWin ? "VICTOIRE !" : "DÉFAITE...";
          
          profileSetup.style.display = "flex";
          overlay.classList.remove("hidden");
          
          // Sauvegarde dans Supabase
          if (supabase) {
            const avatarUrl = customAvatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(currentPseudo)}`;
            supabase.from("championnat_pingpong").insert([{
              pseudo: currentPseudo,
              score_joueur: state.scoreL,
              score_ia: state.scoreR,
              resultat: isWin ? "victoire" : "defaite",
              photo_profil: avatarUrl
            }]).then(({ error }) => {
              if (error) console.error("Erreur d'enregistrement Supabase :", error);
              else {
                  console.log("Résultat du championnat enregistré !");
                  loadLeaderboard(); // Rafraîchir le classement après la partie
              }
            });
          }
        }
      }

      // --- LEADERBOARD LOGIC ---
      async function loadLeaderboard() {
        if (!supabase) return;
        
        const { data, error } = await supabase.from("championnat_pingpong").select("*");
        if (error) {
          console.error("Erreur chargement classement:", error);
          return;
        }

        // Grouper par pseudo
        const players = {};
        data.forEach(match => {
          if (!players[match.pseudo]) {
            players[match.pseudo] = { pts: 0, avatar: match.photo_profil, wins: 0, losses: 0 };
          }
          if (match.resultat === "victoire") {
            players[match.pseudo].pts += 10;
            players[match.pseudo].wins++;
          } else {
            players[match.pseudo].pts -= 5;
            players[match.pseudo].losses++;
          }
          // Garder l'avatar le plus récent
          if (match.photo_profil) players[match.pseudo].avatar = match.photo_profil;
        });

        // Convertir en tableau et trier
        const sorted = Object.entries(players).map(([pseudo, info]) => ({
          pseudo, ...info
        })).sort((a, b) => b.pts - a.pts);

        window.lastSortedLeaderboard = sorted; // Stocker pour le partage

        // Mettre à jour la division du joueur actuel dans le menu
        const me = sorted.find(p => p.pseudo === currentPseudo);
        let myDivName = "Cuir";
        if (me) {
            const div = getDivision(me.pts);
            myDivName = div.name;
            msgEl.innerHTML = `${div.icon} ${div.name.toUpperCase()} <br> <span style="font-size: 14px; opacity: 0.8">${me.pts} pts (${me.wins}V / ${me.losses}D)</span>`;
        }
        
        // Filtrer les joueurs pour ne garder que ceux de la même division
        const sameDivPlayers = sorted.filter(p => getDivision(p.pts).name === myDivName);
        
        document.getElementById("leaderboardTitle").textContent = `🏆 Division ${myDivName}`;
        updateLeaderboardUI(sameDivPlayers);
      }

      function updateLeaderboardUI(players) {
        const container = document.getElementById("leaderboardContent");
        if (players.length === 0) {
          container.innerHTML = "Aucun joueur enregistré.";
          return;
        }

        container.innerHTML = players.map((p, i) => {
          const div = getDivision(p.pts);
          return `
            <div style="display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); ${p.pseudo === currentPseudo ? 'background: rgba(0,242,255,0.1);' : ''}">
              <span style="width: 18px; font-size: 10px; font-weight: bold; color: var(--accent);">${i + 1}</span>
              <img src="${p.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + p.pseudo}" style="width: 20px; height: 20px; border-radius: 50%; margin: 0 6px; border: 1px solid ${div.color};" />
              <div style="flex: 1; overflow: hidden;">
                <div style="font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white;">${p.pseudo}</div>
                <div style="font-size: 9px; color: ${div.color};">${div.icon} ${p.pts} pts</div>
              </div>
            </div>
          `;
        }).join("");
      }

      // Supprimer les anciens boutons de leaderboard si nécessaire

      const btnToggleLeaderboard = document.getElementById("btnToggleLeaderboard");
      const sideLeaderboard = document.getElementById("side-leaderboard");
      
      btnToggleLeaderboard.onclick = () => {
          sideLeaderboard.classList.toggle("hidden-panel");
      };

      // --- RENDER LOOP ---
      function animate() {
        requestAnimationFrame(animate);

        update();
        updateParticles();
        updateTrail();

        // Camera follow logic for perspective 1 (Immersive)
        if (state.camIndex === 1) {
          cameras[1].position.z +=
            (state.paddleL.z - cameras[1].position.z) * 0.05;
          cameras[1].lookAt(10, 0, 0);
        }

        renderer.render(scene, activeCamera);
      }

      window.addEventListener("resize", () => {
        cameras.forEach((cam) => {
          cam.aspect = window.innerWidth / window.innerHeight;
          cam.updateProjectionMatrix();
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
      updateScore();
      loadLeaderboard();
    </script>
  </body>
</html>
