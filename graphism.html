<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Business Intelligence - Dashboard</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Design System BI Premium */
        :root {
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.6);
            --border: rgba(148, 163, 184, 0.1);
            --accent-blue: #38bdf8;
            --accent-pink: #f472b6;
            --accent-green: #4ade80;
            --accent-yellow: #fbbf24;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 114, 182, 0.05) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-title h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.025em; }
        .header-title p { color: var(--text-secondary); font-size: 0.9rem; }

        .back-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--accent-blue); }

        /* KPI Row */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
        }
        .kpi-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; color: var(--accent-blue); }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto auto;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
        }
        .chart-box h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; }
        .chart-box h2::before { content: ''; width: 8px; height: 8px; background: var(--accent-blue); border-radius: 50%; }

        /* Duel Section */
        .duel-section {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .duel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .duel-title { font-size: 1.4rem; font-weight: 700; color: var(--accent-yellow); }
        .duel-selectors { display: flex; gap: 15px; align-items: center; }
        
        select {
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        select:focus { border-color: var(--accent-yellow); }

        .duel-stats-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        .player-vs-card {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .vs-circle {
            width: 60px;
            height: 60px;
            background: var(--accent-yellow);
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }
        .vd-row { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .vd-stat { font-size: 0.8rem; color: var(--text-secondary); }
        .vd-stat b { font-size: 1.2rem; display: block; }

        .major { grid-row: span 2; }

        canvas { width: 100% !important; min-height: 250px; }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .major { grid-row: auto; }
            .duel-stats-container { grid-template-columns: 1fr; gap: 15px; }
            .vs-circle { margin: 10px auto; }
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        /* Modal Player Insight */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            pointer-events: auto;
        }
        .modal-card {
            background: #0f172a;
            border: 2px solid var(--accent-yellow);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            position: relative;
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.4);
            pointer-events: auto;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
        }
        .insight-header { text-align: center; margin-bottom: 25px; }
        .insight-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent-yellow);
            margin-bottom: 15px;
        }
        .follow-toggle-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--accent-yellow);
            background: transparent;
            color: var(--accent-yellow);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
        }
        .follow-toggle-btn.active {
            background: var(--accent-yellow);
            color: #000;
        }
        .private-notice {
            background: rgba(244, 114, 182, 0.1);
            border: 1px dashed var(--accent-pink);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            color: var(--accent-pink);
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">📊 Analyse de la base de données...</div>

    <div class="container">
        <header>
            <div class="header-title">
                <h1>BI Intelligence Arcade</h1>
                <p>Analyse consolidée (Ping Pong)</p>
            </div>
            <a href="index.html" class="back-btn">⬅ Menu</a>
        </header>

        <!-- KPI Globaux -->
        <section class="kpi-row">
            <div class="kpi-card"><div class="kpi-label">Volume Total</div><div class="kpi-value" id="totalMatches">-</div></div>
            <div class="kpi-card"><div class="kpi-label">Joueurs</div><div class="kpi-value" id="totalUsers" style="color: var(--accent-pink)">-</div></div>
            <div class="kpi-card"><div class="kpi-label">Taux d'engagement</div><div class="kpi-value" id="engagementRate" style="color: var(--accent-green)">-</div></div>
        </section>


        <!-- Grille Principale -->
        <main class="dashboard-grid">
            <div class="chart-box major">
                <h2 style="color: var(--accent-blue)">Évolution Journalière</h2>
                <canvas id="dailyLineChart"></canvas>
            </div>
            <div class="chart-box">
                <h2 style="color: var(--accent-pink)">Top Activité (Joueurs)</h2>
                <canvas id="playersBarChart"></canvas>
            </div>
            <div class="chart-box">
                <h2 style="color: var(--accent-green)">Pic d'Heure (0h - 23h)</h2>
                <canvas id="hoursBarChart"></canvas>
            </div>
        </main>
    </div>

    <!-- Modal Fiche Joueur -->
    <div id="insightModal" class="modal-overlay">
        <div class="modal-card">
            <span class="close-modal">&times;</span>
            <div id="insightContent">
                <!-- Rempli en JS -->
            </div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://hedimvodzdzwnluekmtd.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZGltdm9kemR6d25sdWVrbXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NjM3NTMsImV4cCI6MjA4NjMzOTc1M30.OJe37omxb53GnD0uohQ6tfxZPM48daH_sO1YR4SPHCw";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let globalData = [];
        let currentUser = localStorage.getItem("pingpong_pseudo");
        let currentHash = localStorage.getItem("pingpong_password_hash");
        let currentAvatar = localStorage.getItem("pingpong_custom_avatar");
        let myFollows = [];

        async function init() {
            // Charger mes favoris si je suis connecté
            if (currentUser) {
                const { data: profile } = await supabaseClient
                    .from('profils_arcade')
                    .select('favoris')
                    .eq('pseudo', currentUser)
                    .maybeSingle();
                if (profile) myFollows = profile.favoris || [];
            }

            const { data, error } = await supabaseClient.from('championnat_pingpong').select('pseudo, created_at, resultat');
            if (error) return console.error(error);
            
            globalData = data;
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

            const players = process(data);
        }

        window.openPlayerInsight = async function(targetPseudo) {
            const modal = document.getElementById('insightModal');
            const content = document.getElementById('insightContent');
            content.innerHTML = "📊 Chargement du profil...";
            modal.style.display = 'flex';

            // 1. Chercher les infos de confidentialité et avatar
            const { data: profile } = await supabaseClient
                .from('profils_arcade')
                .select('avatar_url, est_prive')
                .eq('pseudo', targetPseudo)
                .maybeSingle();

            const isPrive = profile ? profile.est_prive : false;
            const avatar = profile?.avatar_url || `https://api.dicebear.com/7.x/bottts/svg?seed=${targetPseudo}`;
            const isFollowing = myFollows.includes(targetPseudo);

            // 2. Calculer ses stats
            const matches = globalData.filter(m => m.pseudo === targetPseudo);
            const wins = matches.filter(m => m.resultat === "victoire").length;
            const losses = matches.length - wins;

            let html = `
                <div class="insight-header">
                    <img src="${avatar}" class="insight-avatar" />
                    <h2 style="color: white; margin-bottom: 5px;">${targetPseudo}</h2>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">Joueur Arcade</p>
                </div>
            `;

            if (isPrive && targetPseudo !== currentUser) {
                html += `
                    <div class="private-notice">
                        🔒 Ce profil est privé.<br>
                        <span style="font-size: 0.8rem; font-weight: 400; opacity: 0.8;">Les statistiques détaillées ne sont pas visibles.</span>
                    </div>
                `;
            } else {
                html += `
                    <div class="duel-stats-container" style="margin-top: 10px; gap: 20px;">
                        <div class="player-vs-card" style="padding: 15px;">
                            <div class="vd-stat" style="color: var(--accent-green)">V <b style="font-size: 1.5rem;">${wins}</b></div>
                        </div>
                        <div class="vs-circle" style="width: 40px; height: 40px; font-size: 0.8rem;">PK</div>
                        <div class="player-vs-card" style="padding: 15px;">
                            <div class="vd-stat" style="color: var(--accent-pink)">D <b style="font-size: 1.5rem;">${losses}</b></div>
                        </div>
                    </div>
                    <p style="text-align: center; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 10px;">Ratio: ${matches.length > 0 ? ((wins/matches.length)*100).toFixed(0) : 0}% de victoires</p>
                `;
            }

            if (currentUser && targetPseudo !== currentUser) {
                html += `
                    <button id="toggleFollowBtn" class="follow-toggle-btn ${isFollowing ? 'active' : ''}" data-pseudo="${targetPseudo}">
                        ${isFollowing ? '✅ Suivi' : '⭐ Suivre'}
                    </button>
                `;
            }

            content.innerHTML = html;
        }

        window.toggleFollow = async function(target) {
            if (!currentUser) return;
            const btn = document.getElementById('toggleFollowBtn');
            const isF = myFollows.includes(target);

            if (isF) {
                myFollows = myFollows.filter(p => p !== target);
            } else {
                myFollows.push(target);
            }

            if (btn) {
                btn.classList.toggle('active', !isF);
                btn.textContent = !isF ? "✅ Suivi" : "⭐ Suivre";
            }

            // Utilisation d'upsert pour garantir la création du profil si besoin
            await supabaseClient
                .from('profils_arcade')
                .upsert({ 
                    pseudo: currentUser, 
                    password_hash: currentHash || 'legacy', 
                    avatar_url: currentAvatar,
                    favoris: myFollows 
                }, { onConflict: 'pseudo' });
        }
        
        // Délégation d'événements pour la modale
        document.addEventListener('click', (e) => {
            // Fermer si clic sur l'overlay (fond sombre) OU sur la croix
            if (e.target.id === 'insightModal' || e.target.classList.contains('close-modal')) {
                closeInsight();
            }
            
            // Gérer le bouton Suivre
            const followBtn = e.target.closest('#toggleFollowBtn');
            if (followBtn) {
                const target = followBtn.dataset.pseudo;
                if (target) toggleFollow(target);
            }
        });

        function closeInsight() {
            document.getElementById('insightModal').style.display = 'none';
        }
        window.closeInsight = closeInsight;

        function process(data) {
            const days = {};
            const hours = Array(24).fill(0);
            const players = {};

            data.forEach(m => {
                const dateObj = new Date(m.created_at);
                const day = dateObj.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
                days[day] = (days[day] || 0) + 1;
                hours[dateObj.getHours()]++;
                const p = m.pseudo || "Anonyme";
                players[p] = (players[p] || 0) + 1;
            });

            document.getElementById('totalMatches').textContent = data.length;
            const uniqueP = Object.keys(players).length;
            document.getElementById('totalUsers').textContent = uniqueP;
            document.getElementById('engagementRate').textContent = uniqueP > 0 ? (data.length / uniqueP).toFixed(1) + " matches/u" : "0";

            renderDaily(days);
            renderPlayers(players);
            renderHours(hours);
        }

        function renderDaily(daysData) {
            const sortedDays = Object.keys(daysData).slice(-15);
            new Chart(document.getElementById('dailyLineChart'), {
                type: 'line',
                data: {
                    labels: sortedDays,
                    datasets: [{
                        label: 'Matchs',
                        data: sortedDays.map(d => daysData[d]),
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointBackgroundColor: '#38bdf8'
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function renderPlayers(playersData) {
            const sorted = Object.entries(playersData).sort((a,b) => b[1]-a[1]).slice(0, 5);
            new Chart(document.getElementById('playersBarChart'), {
                type: 'bar',
                data: {
                    labels: sorted.map(p => p[0]),
                    datasets: [{
                        data: sorted.map(p => p[1]),
                        backgroundColor: '#f472b6',
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    onClick: (e, elements, chart) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const pseudo = chart.data.labels[index];
                            openPlayerInsight(pseudo);
                        }
                    },
                    scales: { 
                        x: { display: false },
                        y: { grid: { display: false }, ticks: { color: '#f8fafc', font: { weight: 'bold' } } }
                    }
                }
            });
        }

        function renderHours(hoursData) {
            new Chart(document.getElementById('hoursBarChart'), {
                type: 'bar',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i + 'h'),
                    datasets: [{
                        data: hoursData,
                        backgroundColor: '#4ade80',
                        borderRadius: 4
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 } } }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
